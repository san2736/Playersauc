<!-- templates/player.html -->

<!DOCTYPE html>
<html>

<head>
<title>{{player[1]}}</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:10px;
width:80%;
}

button{
padding:10px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

a{
display:block;
margin-top:20px;
text-decoration:none;
color:#007BFF;
}

</style>

</head>

<body>

<div class="container">

<h1>{{player[1]}}</h1>

<p>Country: {{player[2]}}</p>
<p>Role: {{player[3]}}</p>
<p>Strike Rate: {{player[4]}}</p>

<h2>Highest Bid: {{highest_bid}}</h2>

<form action="/bid/{{player[0]}}" method="POST">

<input type="text" name="bidder" placeholder="Your Name">

<input type="number" name="amount" placeholder="Bid Amount">

<br>

<button type="submit">Place Bid</button>

</form>

<a href="/">Back to Players</a>

</div>

</body>
</html>
